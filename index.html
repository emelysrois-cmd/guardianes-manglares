<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardianes del Manglar - La Guajira</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #fcfcfc; color: #1b4332; }
        
        /* Banner Principal - IMAGEN DE ZONA VERDE AQUÍ */
        header { 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1544551763-47a184230181?ixlib=rb-1.2.1&auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center; height: 500px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; padding: 20px;
        }

        .container { padding: 40px 20px; max-width: 900px; margin: auto; }

        /* Tarjetas */
        .card { 
            background: white; padding: 30px; border-radius: 25px; 
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            display: flex; align-items: center; gap: 30px; border: 1px solid #e0e0e0;
        }
        
        .card-img { width: 300px; height: 200px; object-fit: cover; border-radius: 15px; }

        /* Botones */
        .btn { 
            background: #2d6a4f; color: white; padding: 15px 30px; 
            text-decoration: none; border-radius: 50px; font-weight: 600;
            display: inline-block; margin-top: 15px;
        }
        .btn:hover { background: #1b4332; }

        /* Formulario */
        .form-section { background: #f0f7f4; padding: 30px; border-radius: 25px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .submit-btn { background: #1b4332; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; cursor: pointer; font-size: 16px; font-weight: 600; }
        .submit-btn:hover { background: #2d6a4f; }
    </style>
</head>
<body>

    <header>
        <h1 style="font-size: 3.5rem; margin: 0;">GUARDIANES DEL MANGLAR</h1>
        <p style="font-size: 1.5rem;">Protección y Monitoreo para La Guajira, Colombia</p>
    </header>

    <div class="container">
        <!-- Sección Manual -->
        <section class="card">
            <div>
                <h2>📖 MANUAL DEL GUARDIÁN AMBIENTAL</h2>
                <p>Descarga la guía esencial para la preservación de nuestro entorno natural.</p>
                <a href="manual.pdf" class="btn" download>⬇️ Descargar Manual PDF</a>
            </div>
            <img src="https://images.unsplash.com/photo-1596422846543-75c6fc197f07?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" class="card-img" alt="Manglar">
        </section>

        <!-- Formulario -->
        <section class="form-section">
            <h2>📢 ENVIAR REPORTE DE SALUD</h2>
            <form action="https://formspree.io/f/xnjyzndn" method="POST">
                <input type="text" name="nombre" placeholder="Tu nombre" required>
                <input type="email" name="email" placeholder="Correo electrónico" required>
                <textarea name="mensaje" rows="4" placeholder="¿Qué observaste en la zona verde?..." required></textarea>
                <button type="submit" class="submit-btn">¡Reportar Ahora!</button>
            </form>
        </section>
    </div>

</body>
</html>
